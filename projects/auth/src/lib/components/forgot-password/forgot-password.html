<section class="flex flex-col h-full gap-2.5" aria-labelledby="forgot-title">

  <!-- Header -->
  <header class="w-full max-w-113  flex flex-col gap-2.5 pb-6">

    <h1 class="font-inter font-bold
             text-[24px] md:text-[30px]
             leading-6 md:leading-7.5
             text-[#1F2937]">
      Forgot Password
    </h1>
    <p class="font-mono font-normal text-[16px] leading-[100%] tracking-[0] text-gray-500">
      Don’t worry, we will help you recover your account. </p>
  </header>


    <!-- Form Container -->
  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onForgotPasswordSubmit()"
    class="w-full max-w-lg  m-0 bg-white  rounded-lg  ">

    <!-- Email Field -->
    <div class="flex flex-col w-full max-w-[452px] gap-[10px] ">

      <!-- Label -->
      <label for="email" class="font-geist font-medium text-[16px] leading-[27px] text-black">
        Email
      </label>

      <!-- Input -->
      <input type="text" ju8 placeholder="user@example.com" formControlName="email" class="w-full h-[46px] px-[10px] border border-[#E5E7EB]
      placeholder-geist placeholder-normal placeholder-[14px] placeholder-[#9CA3AF] placeholder-align-middle
                focus:outline-none focus:ring-2 focus:ring-[#155DFC]"
        [ngClass]="{'border-red-600': forgotPasswordForm.get('email')?.invalid && (forgotPasswordForm.get('email')?.touched || forgotPasswordForm.get('email')?.dirty)}"
        required />
    </div>

    <!-- Error message -->
    <div class="w-full max-w-[452px]  text-[#DC2626] font-geist font-normal text-[14px]
            leading-[22px] align-bottom">
      <lib-input-error [control]="forgotPasswordForm.get('email')" [backendError]="errorMessage"></lib-input-error>
    </div>


  <div class="w-full max-w-[452px] flex flex-col gap-9 pt-6">

  <!-- Button -->
  <lib-register-button bgColor="bg-blue-600" textColor="text-white"> </lib-register-button>
  <!-- Redirect -->
  <app-auth-redirect ></app-auth-redirect>
  </div>

</form>

</section>
