<nav aria-label="Breadcrumb">
  <app-breadcrumbs></app-breadcrumbs>
</nav>

<main class="w-full p-4 md:p-6 flex flex-col gap-6">

  <!-- Header -->
  <header class="w-full h-19.25 flex items-center gap-2.5 ">
    <app-back-arrow></app-back-arrow>
    @if(diplomaDetails){
    <app-page-title class="flex-1" [title]="diplomaDetails.title" [icon]="BookOpenCheck">
    </app-page-title>
    }


  </header>

  <!-- Exams Section -->
  <section aria-label="Exams List" class="w-full flex  flex-col gap-4 p-6 bg-white">

    @for (exam of exams; track exam.id) {

    <article class="group relative w-full h-auto max-h-[136px] flex bg-blue-50 p-4 gap-4">

      <!-- Image -->
      <div
        class="w-full md:w-[100px] h-[120px] md:h-[100px] border border-blue-300 bg-blue-100 flex items-center justify-center">
        <img [src]="exam.image" [alt]="exam.title" class="w-[74px] h-[74px]">
      </div>

      <!-- Content -->
      <div class="w-full flex flex-col gap-1.5">

        <!-- Title + Info -->
        <div class="flex justify-between">

          <h2 class="font-mono font-semibold text-[20px] text-blue-600 flex-1">
            {{ exam.title }}
          </h2>

          <div class="flex shrink-0 items-start gap-2">

            <!-- Questions -->
            <div class="flex items-center gap-1.5">
              <lucide-angular [img]="CircleQuestionMark" class="w-[15px] h-[15px] text-gray-800">
              </lucide-angular>

              <span class="text-sm text-gray-800">
                {{ exam.questionsCount }} Questions
              </span>
            </div>

            <div class="h-[18px] border-l border-slate-300 hidden md:block"></div>

            <!-- Duration -->
            <div class="flex items-center gap-1.5">
              <lucide-angular [img]="Timer" class="w-[15px] h-[15px] text-gray-800">
              </lucide-angular>

              <span class="text-sm text-gray-800">
                {{ exam.duration }} minutes
              </span>
            </div>

          </div>

        </div>

        <!-- Description -->
        <p class="text-sm text-gray-500 line-clamp-3 md:ine-clamp-4">
          {{ exam.description }}
        </p>

      </div>

    <!-- start exam button  -->
    <button [routerLink]="[exam.id]"
      class="inline-flex items-center gap-[10px] w-[102px] h-[30px] px-4 py-1.5 bg-blue-600 text-white 
       font-geist text-sm font-normal leading-none align-middle 
       absolute  right-2.5 bottom-2.5 opacity-0 translate-y-2
           transition-all duration-300 group-hover:opacity-100 group-hover:translate-y-0">
      Start
      <lucide-angular [img]="MoveRight" class="w-4 h-4 text-white">
      </lucide-angular>
    </button>
    </article>
    
    }

  </section>

</main>
