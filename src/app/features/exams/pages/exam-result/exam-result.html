<nav aria-label="Breadcrumb">
    <app-breadcrumbs></app-breadcrumbs>
</nav>

<main class="w-full p-4 md:p-6 flex flex-col gap-6">

    <!-- Header -->
    <header class="w-full h-19.25 flex items-center gap-2.5 ">
        <app-back-arrow></app-back-arrow>

        <app-page-title class="flex-1" [title]="'title'" [icon]="CircleQuestionMark ">
        </app-page-title>



    </header>

    <!-- Exams Section -->
    <section aria-label="Exam Questions" class="w-full flex  flex-col gap-4 p-6 bg-white">

        <!-- Header  -->
        <div class="w-full flex gap-6 items-center">

            <!-- Info -->
            <div class="flex-1 flex flex-col gap-1.5">

                <!-- Title -->
                <div class="w-full flex justify-between">

                    <h5 class="font-mono text-[16px] text-gray-500">
                        @if(examDetails){
                        {{ examDetails.diploma.title }} - {{examDetails.title}}
                        }
                    </h5>

                    <p class="font-mono text-[14px] text-gray-500">
                        Question
                        <span class="font-bold text-blue-600">{{examDetails.questionsCount}}</span>
                        @if(examDetails){
                        of {{examDetails.questionsCount}}

                        }
                    </p>

                </div>

                <!-- Progress -->
                <div class="w-full h-[16px] bg-neutral-quaternary  ">
                    <div class="bg-brand h-[16px] transition-all duration-500 " [style.width.%]="progress$ | async">
                    </div>
                </div>

            </div>

            
        </div>


        <!-- footer restart and explore buttons -->
        <div class="w-full flex  gap-4 pt-6">
            <app-exam-navigation-button label="Restart" variant="secondary" (click)="restart()" class="flex-1">
            </app-exam-navigation-button>

            <app-exam-navigation-button label="Explore" (click)="explore()" class="flex-1">
            </app-exam-navigation-button>
        </div>


    </section>
