<section class="flex justify-items-start  flex-col  h-full px-4">
  <!-- create password Header -->
  <header class="mb-6 ">

    <h1 class="text-3xl font-bold text-gray-800">Create New Password</h1>
    <p class="pt-3 text-gray-600">
      Create a new strong password for your account .
    </p>
  </header>

  <!-- Form Container -->
  <form [formGroup]="resetPasswordForm" (ngSubmit)="onResetPasswordFormSubmit()" class="w-full max-w-lg  m-0 bg-white  rounded-lg  space-y-6">


    <!--create new Password Field -->
    <div class="flex flex-col">
      <label for="new-password" class="mb-2 text-sm font-medium text-gray-700">New Password</label>
      <input type="password" id="new-password" formControlName="newPassword" placeholder="Enter new password "
        class="px-4 py-2 border border-gray-100  text-gray-400 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
    </div>
    <!-- confirm new Password Field -->
    <div class="flex flex-col">
      <label for="confirm-new-password" class="mb-2 text-sm font-medium text-gray-700">Confirm New Password</label>
      <input type="password" id="confirm-new-password" formControlName="confirmNewPassword" placeholder="Confirm new password"
        class="px-4 py-2 border border-gray-100 f text-gray-400 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
         />
    </div>



    <!-- reset password Button -->
    <app-auth-button label="Reset Password"[disabled]="!resetPasswordForm.valid"></app-auth-button>

    <app-auth-redirect></app-auth-redirect>
  </form>
</section>
