<section class="flex justify-items-start  flex-col  h-full px-4 gap-4 box-border ">
  <!-- Register info -->
  <header class="w-full max-w-113  flex items-center gap-2.5">

    <h1 class="font-inter font-bold
             text-[24px] md:text-[30px]
             leading-6 md:leading-7.5
             text-[#1F2937]">
      Create Account
    </h1>

  </header>
  <!-- Tell us more about you  Section -->
  <article class="w-full max-w-113 flex justify-center flex-col gap-2.5">

    <!-- Tell us more about you Title -->
    <h3 class="font-inter  font-bold text-[24px] leading-6 tracking-[0px] text-blue-600">
      Tell us more about you
    </h3>
  </article>

  <!-- Form Container -->
  <div class="max-w-113 flex flex-col gap-4 py-4">

    <form [formGroup]="registerForm" (ngSubmit)="onRegisterSubmit()"
      class="w-full md:w-[452px] flex flex-col gap-4 py-4">

      <!-- First & Last Name -->
      <div class="flex flex-col md:flex-row gap-2.5 w-full">

        <!-- First Name -->
        <div class="w-full">
          <label class="block mb-1 font-geist-mono font-medium text-[16px] leading-4 text-gray-800">
            First name <span class="text-red-600">*</span>
          </label>

          <input type="text" placeholder="First name" formControlName="firstName" class="w-full md:w-[221px] h-[46px] border p-[10px] box-border
             border-[#E5E7EB]
             placeholder:text-gray-400 placeholder:font-geist-mono
             placeholder:text-[14px]
             focus:outline-none" />

          <!-- Error -->
          <div class="text-sm font-medium text-[#DC2626] ">
            <lib-input-error [control]="registerForm.get('firstName')" [backendError]="errorMessage"
              [fieldName]="'first name'"></lib-input-error>
          </div>
        </div>

        <!-- Last Name -->
        <div class="w-full">
          <label class="block mb-1 font-geist-mono font-medium text-[16px] leading-4 text-gray-800">
            Last name <span class="text-red-600">*</span>
          </label>

          <input type="text" placeholder="Last name" formControlName="lastName" class="w-full md:w-[221px] h-[46px] border p-[10px] box-border
             border-[#E5E7EB]
             placeholder:text-gray-400 placeholder:font-geist-mono
             placeholder:text-[14px]
             focus:outline-none" />
          <!-- Error -->
          <div class="text-sm font-medium text-[#DC2626] ">
            <lib-input-error [control]="registerForm.get('lastName')" [backendError]="errorMessage"
              [fieldName]="'last name'"></lib-input-error>
          </div>
        </div>

      </div>
      <!-- Username -->
      <div class="flex flex-col gap-1 w-full">

        <!-- Label -->
        <label class="font-geist-mono font-medium text-[16px] leading-4 text-gray-800">
          Username <span class="text-red-600">*</span>
        </label>

        <!-- Input -->
        <input type="text" placeholder="Enter username" formControlName="username" class="w-full md:w-[452px] h-[46px] border p-[10px] box-border
           border-[#E5E7EB]
           text-gray-800
           placeholder:text-gray-400 placeholder:font-geist-mono
           placeholder:text-[14px]
           focus:outline-none" />

        <!-- Error -->
        <div class="text-sm font-medium text-[#DC2626] ">
          <lib-input-error [control]="registerForm.get('username')" [backendError]="errorMessage"
            [fieldName]="'username'"></lib-input-error>
        </div>



      </div>




      <!-- Phone + Country Code -->
      <!-- Phone -->
      <div class="flex flex-col gap-1 w-full">

        <!-- Label -->
        <label class="font-geist-mono font-medium text-[16px] leading-4 text-gray-800">
          Phone
        </label>

        <!-- Input -->
        <div class="flex items-center gap-2">
          <ngx-intl-tel-input formControlName="phone" [enablePlaceholder]="true" [separateDialCode]="true"
             class="w-full md:w-[452px] h-[46px] border p-[10px] box-border
           border-[#E5E7EB]
           text-gray-800
           placeholder:text-gray-400 placeholder:font-geist-mono
           placeholder:text-[14px]
           focus:outline-none"></ngx-intl-tel-input>
          <span class="text-sm text-gray-500">
            {{ selectedCountryCode }}
          </span>
        </div>


        <!-- Error -->
        <div class="text-sm font-medium text-[#DC2626] ">
          <lib-input-error [control]="registerForm.get('phone')" [backendError]="errorMessage"
            [fieldName]="'phone'"></lib-input-error>
        </div>

      </div>


      <!-- Button -->
      <lib-register-button></lib-register-button>

    </form>



  </div>
</section>
