<section class="w-full max-w-md mx-auto ">

  <div class="w-[452px] flex items-start gap-2.5">

    <!-- arrow Icon -->
    <div routerLink="/forget-password"
      class=" flex items-center justify-center w-10 h-10 border-[1.5px] border-gray-200 text-gray-800 gap-2.5   cursor-pointer">
      <lucide-angular [img]="MoveLeft"></lucide-angular>
    </div>


  </div>

  <article class="w-[452px] h-full flex flex-col gap-4">
    <header>
      <h1 class="font-sans font-bold text-[30px] leading-none text-gray-800 mt-10">
        Password Reset Sent
      </h1>
    </header>

    <p class="font-mono font-normal text-[16px] leading-none text-gray-800">
      We have sent a password reset link to: <span class="font-mono font-normal text-[16px] leading-none text-blue-500">
  {{email}}
</span>
    </p>


    <p class="font-mono font-normal text-[16px] leading-none text-gray-800">
      Please check your inbox and follow the instructions to reset your password.
    </p>

    <p class="font-mono font-normal text-[14px] leading-none text-gray-500 tracking-[0px]">
      If you don't see the email within a few minutes, check your spam or junk folder.
    </p>

  </article>

  <footer class="w-full flex pt-6 gap-9 mt-10">
    <lib-auth-redirect text="Don't have an account?" linkText="Create yours" link="/auth/send-email-verification">
    </lib-auth-redirect>
  </footer>
  
  

</section>
