<section class="flex justify-items-start  flex-col  h-full gap-4 box-border ">
  <!-- Register info -->
  <header class="w-full max-w-113  flex flex-col pb-6 gap-2.5">

    <h1 class="font-sans font-bold
             text-[24px] md:text-[30px]
             leading-6 md:leading-7.5
             text-[#1F2937]">
      Create a New Password
    </h1>
    <p class="font-mono font-normal text-[16px] leading-none text-gray-500 ">
      Create a new strong password for your account.
    </p>

  </header>



  <!-- Form Container -->
  <div class="w-full flex flex-col  ">
    <form [formGroup]="resetPasswordForm" (ngSubmit)="onResetPasswordFormSubmit()">
      <!--  password -->
      <div class="flex flex-col gap-1.5 w-full">

        <!-- Label -->
        <label class="font-mono font-medium text-[16px] leading-none text-gray-800">
          New Password
        </label>
        <!-- Input -->
        <p-password formControlName="password" [feedback]="false" [toggleMask]="true"
          styleClass="w-full md:w-[452px] !rounded-none"
          inputStyleClass="h-[46px] w-full border p-2.5 border border-gray-200  text-gray-800 placeholder:text-gray-400 placeholder:text-[14px] focus:outline-none !rounded-none">
        </p-password>

        <!-- Error -->
        <div class="text-sm font-medium text-[#DC2626] ">
          <lib-input-error [control]="resetPasswordForm.get('password')" 
            [fieldName]="'password'"></lib-input-error>
        </div>



      </div>

      <!-- Confirm New Password -->
      <div class="flex flex-col gap-1.5 w-full mt-4  mb-10">

        <!-- Label -->
        <label class="font-mono font-medium text-[16px] leading-none text-gray-800 ">
          Confirm New Password
        </label>

        <!-- Input -->

        <p-password formControlName="confirmPassword" [feedback]="false" [toggleMask]="true"
          styleClass="w-full md:w-[452px] !rounded-none"
          inputStyleClass="h-[46px] w-full border border-[#E5E7EB] !rounded-none  p-[10px] text-gray-800 placeholder:text-gray-400 placeholder:text-[14px] focus:outline-none">
        </p-password>


        <!-- Error -->
        <div class="text-sm font-medium text-[#DC2626] ">
          <lib-input-error [control]="resetPasswordForm.get('confirmPassword')" 
            [fieldName]="'Confirm Password'"></lib-input-error>
        </div>

          <!-- Server Error Message -->
    @if(errorMessage){
    <div class="relative ">
      <lucide-angular [img]="CircleX"
        class="absolute left-1/2 -top-1  transform -translate-x-1/2  w-[18px] h-[18px] text-[#DC2626] flex-shrink-0">
      </lucide-angular>
      <div class=" w-full max-w-[452px] h-[38px] px-[10px] py-[10px] mt-2
            border border-[#DC2626] bg-[#FEF2F2]
            flex items-center justify-center">

        <span class="font-geist font-normal text-[14px] leading-[18px] text-[#DC2626]">
          {{ errorMessage }}
        </span>
      </div>
    </div>

  }
      </div>
      <lib-auth-button [label]="'Reset Password'" [disabled]="resetPasswordForm.invalid"></lib-auth-button>
    </form>
  </div>
</section>
