<section class="flex flex-col h-full px-4" aria-labelledby="forgot-title">

  <!-- Header -->
  <header class="mb-6">
    <h1 id="forgot-title" class="text-3xl font-bold text-gray-800">
      Forgot Password
    </h1>

    <p class="pt-3 text-gray-600">
      Don't worry, we will help you recover your account.
    </p>
  </header>

  <!-- Form -->
  <form class="w-full max-w-lg bg-white rounded-lg space-y-6" [formGroup]="forgotPasswordForm"
   (ngSubmit)="onForgotPasswordSubmit()">

    <!-- Email Field -->
    <div class="flex flex-col">
      <label for="email" class="mb-2 text-sm font-medium text-gray-700">
        Email
      </label>

      <input type="email" id="email" formControlName="email"   placeholder="enter email"
        class="px-4 py-3 border border-gray-300 text-gray-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition" />
    </div>

    <!-- Continue Button -->
    <app-auth-button label="Continue" [disabled]="!forgotPasswordForm.valid" >
    </app-auth-button>

  </form>

  <!-- Redirect -->
  <footer class="mt-6">
    <app-auth-redirect text="Don't have an account?" linkText="Create yours" link="/register">
    </app-auth-redirect>
  </footer>

</section>
